stages:
  - test
  - scan
  - build
  - deploy

variables:
  IMAGE_NAME: gitlab.home:5050/tmd526/flask-api
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA

unit-tests:
  stage: test
  image: python:3.12
  script:
    - pip install -r requirements.txt
    - pytest test/

semgrep:
  stage: scan
  image: 
    name: semgrep/semgrep
    entrypoint: [""]
  script:
    - semgrep scan --config auto .

gitleaks:
  stage: scan
  image:
    name: zricethezav/gitleaks
    entrypoint: [""]
  script:
    - gitleaks detect --source . -v

trivy:
  stage: scan
  image: 
    name: aquasec/trivy:0.61.0
    entrypoint: [""]
  script:
    - trivy fs --exit-code 1 --severity HIGH,CRITICAL .

build:
  stage: build
  image: docker:24
  services:
    - name: docker:24-dind
      command: ["--insecure-registry=gitlab.home:5050"]
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $IMAGE_NAME:$IMAGE_TAG .
    - docker push $IMAGE_NAME:$IMAGE_TAG

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache git
    - git config --global user.email "ci@gitlab.home"
    - git config --global user.name "Gitlab CI"
  script:
    - git clone --config http.sslVerify=false https://tmd526:$GITLAB_TOKEN@gitlab.home/tmd526/flask-api.git repo
    - cd repo
    - sed -i "s|flask-api:.*|flask-api:$IMAGE_TAG|g" k8s/deployment.yaml
    - git add k8s/deployment.yaml
    - git commit -m "CI - update image tag to $IMAGE_TAG [skip ci]"
    - git push
  only:
    - master
